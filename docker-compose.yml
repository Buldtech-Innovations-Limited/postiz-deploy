version: "3.8"

services:
  postiz-app:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    deploy:
      labels:
        - traefik.enable=true
        - traefik.swarm.network=dokploy-network
        - traefik.http.routers.buldtech-postiz-web.rule=Host(`${POSTIZ_HOST}`)
        - traefik.http.routers.buldtech-postiz-web.entrypoints=web
        - traefik.http.routers.buldtech-postiz-web.middlewares=redirect-to-https@file
        - traefik.http.routers.buldtech-postiz-web.service=buldtech-postiz
        - traefik.http.routers.buldtech-postiz-websecure.rule=Host(`${POSTIZ_HOST}`)
        - traefik.http.routers.buldtech-postiz-websecure.entrypoints=websecure
        - traefik.http.routers.buldtech-postiz-websecure.tls=true
        - traefik.http.routers.buldtech-postiz-websecure.tls.certresolver=letsencrypt
        - traefik.http.routers.buldtech-postiz-websecure.service=buldtech-postiz
        - traefik.http.services.buldtech-postiz.loadbalancer.server.port=5000
    environment:
      MAIN_URL: https://${POSTIZ_HOST}
      FRONTEND_URL: https://${POSTIZ_HOST}
      NEXT_PUBLIC_BACKEND_URL: https://${POSTIZ_HOST}/api
      BACKEND_INTERNAL_URL: http://localhost:3000

      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postiz-postgres:5432/${DB_NAME}
      REDIS_URL: redis://postiz-redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}

      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"

      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads

      API_LIMIT: "30"
      NX_ADD_PLUGINS: "false"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    depends_on:
      - postiz-postgres
      - postiz-redis
      - temporal
    networks:
      dokploy-network:
        aliases:
          - postiz-app

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      dokploy-network:
        aliases:
          - postiz-postgres

  postiz-redis:
    image: redis:7.2
    restart: always
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - postiz-redis-data:/data
    networks:
      dokploy-network:
        aliases:
          - postiz-redis

  temporal-postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      dokploy-network:
        aliases:
          - temporal-postgresql

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      dokploy-network:
        aliases:
          - temporal-elasticsearch

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: "true"
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      dokploy-network:
        aliases:
          - temporal

volumes:
  postiz-postgres-data:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-data:
  temporal-elasticsearch-data:

networks:
  dokploy-network:
    external: true
